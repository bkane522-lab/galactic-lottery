<div class="logo">
  <svg viewBox="0 0 120 120" aria-label="Galactic Lottery Logo">
    <defs>
      <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%">
        <stop offset="0%" stop-color="#7b2fff"/>
        <stop offset="55%" stop-color="#18003a"/>
        <stop offset="100%" stop-color="#05000b"/>
      </radialGradient>

      <linearGradient id="goldLogo" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fff7c2"/>
        <stop offset="45%" stop-color="#f0c040"/>
        <stop offset="100%" stop-color="#9c6500"/>
      </linearGradient>

      <linearGradient id="purpleLogo" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#caa7ff"/>
        <stop offset="100%" stop-color="#4d16b8"/>
      </linearGradient>

      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <rect x="4" y="4" width="112" height="112" rx="28" fill="url(#bgGlow)" stroke="rgba(240,192,64,.45)" stroke-width="2"/>

    <circle cx="60" cy="60" r="28" fill="#12002a" stroke="url(#goldLogo)" stroke-width="5"/>
    <circle cx="60" cy="60" r="44" fill="none" stroke="url(#purpleLogo)" stroke-width="4" opacity=".9"/>
    <ellipse cx="60" cy="60" rx="50" ry="20" fill="none" stroke="url(#goldLogo)" stroke-width="5" transform="rotate(-18 60 60)" filter="url(#glow)"/>
    <ellipse cx="60" cy="60" rx="48" ry="18" fill="none" stroke="#7b2fff" stroke-width="2" transform="rotate(22 60 60)" opacity=".75"/>

    <path d="M60 35 L67 52 L85 52 L70 63 L76 82 L60 70 L44 82 L50 63 L35 52 L53 52 Z"
          fill="url(#goldLogo)" filter="url(#glow)"/>

    <circle cx="91" cy="38" r="10" fill="#1b0038" stroke="url(#goldLogo)" stroke-width="3"/>
    <text x="91" y="43" text-anchor="middle" font-size="13" font-weight="900" fill="#fff1a8" font-family="Arial">7</text>

    <circle cx="29" cy="78" r="10" fill="#1b0038" stroke="url(#goldLogo)" stroke-width="3"/>
    <text x="29" y="83" text-anchor="middle" font-size="12" font-weight="900" fill="#fff1a8" font-family="Arial">12</text>

    <circle cx="75" cy="96" r="10" fill="#1b0038" stroke="url(#goldLogo)" stroke-width="3"/>
    <text x="75" y="101" text-anchor="middle" font-size="11" font-weight="900" fill="#fff1a8" font-family="Arial">24</text>
  </svg>
</div>
