<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galactic Lottery</title>
<meta name="theme-color" content="#0a0012">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;800&display=swap');

:root{
  --deep:#090011;
  --cosmic:#15002d;
  --violet:#7b2fff;
  --violet-soft:#b98cff;
  --gold:#f0c040;
  --gold-soft:#ffe8a3;
  --white:#f6f0ff;
  --muted:rgba(246,240,255,.72);
  --card:rgba(255,255,255,.055);
  --border:rgba(123,47,255,.28);
  --blue:#0061ff;
  --red:#d92a2a;
  --green:#25d366;
  --ok:#21d68f;
  --danger:#ff6b83;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  color:var(--white);
  font-family:Inter,sans-serif;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 20% 15%, rgba(123,47,255,.20), transparent 32%),
    radial-gradient(circle at 82% 72%, rgba(240,192,64,.08), transparent 30%),
    linear-gradient(180deg,#08000f,#15002d 58%,#05000b);
}

.stars{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  border-radius:50%;
  background:#fff;
  opacity:.72;
  animation:twinkle 2.8s infinite alternate ease-in-out;
}

@keyframes twinkle{
  from{opacity:.15;transform:scale(.8)}
  to{opacity:.95;transform:scale(1.45)}
}

.container{
  position:relative;
  z-index:1;
  max-width:560px;
  margin:0 auto;
  padding:16px 14px 28px;
}

.header{
  text-align:center;
  margin-bottom:14px;
}

.logo{
  width:62px;
  height:62px;
  margin:0 auto 8px;
  border-radius:21px;
  border:1px solid rgba(240,192,64,.25);
  background:rgba(255,255,255,.045);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 28px rgba(240,192,64,.12);
}

.logo svg{
  width:48px;
  height:48px;
}

h1{
  font-family:Orbitron,sans-serif;
  font-size:25px;
  line-height:1.05;
  letter-spacing:1.6px;
  font-weight:900;
  margin-bottom:7px;
  background:linear-gradient(135deg,var(--gold),#fff3b0,var(--gold));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.subtitle{
  font-size:13px;
  line-height:1.4;
  color:var(--muted);
}

.tabs{
  display:flex;
  gap:8px;
  background:rgba(255,255,255,.045);
  border:1px solid var(--border);
  border-radius:16px;
  padding:5px;
  margin-bottom:12px;
}

.tab{
  flex:1;
  border:0;
  border-radius:12px;
  padding:12px 8px;
  background:transparent;
  color:rgba(246,240,255,.50);
  font-size:14px;
  font-weight:800;
  cursor:pointer;
}

.tab.active.euro{
  background:linear-gradient(135deg,#0030aa,#0061ff);
  color:#fff2a8;
  box-shadow:0 0 20px rgba(0,97,255,.34);
}

.tab.active.loto{
  background:linear-gradient(135deg,#8a0000,#dd382f);
  color:#fff2a8;
  box-shadow:0 0 20px rgba(221,56,47,.32);
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  padding:16px;
  margin-bottom:12px;
  backdrop-filter:blur(12px);
  box-shadow:0 16px 50px rgba(0,0,0,.30);
}

.card-title{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1.4px;
  font-weight:800;
  color:var(--violet-soft);
  margin-bottom:10px;
}

.next{
  font-size:13px;
  line-height:1.35;
  color:var(--muted);
  margin-bottom:10px;
}

.countdown-line{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:7px;
  margin-bottom:12px;
}

.timebox{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  border-radius:13px;
  padding:8px 5px;
  text-align:center;
}

.timebox strong{
  display:block;
  font-family:Orbitron,sans-serif;
  font-size:15px;
  color:var(--gold-soft);
}

.timebox span{
  display:block;
  margin-top:2px;
  font-size:9px;
  text-transform:uppercase;
  letter-spacing:.8px;
  color:var(--muted);
}

.balls-row{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:9px;
}

.ball{
  width:49px;
  height:49px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Orbitron,sans-serif;
  font-size:16px;
  font-weight:900;
  color:#fff;
  background:
    radial-gradient(circle at 32% 28%,rgba(255,255,255,.36),transparent 18%),
    radial-gradient(circle at 50% 55%,rgba(255,255,255,.10),rgba(0,0,0,.42));
  border:2px solid rgba(255,255,255,.15);
  box-shadow:0 0 16px rgba(123,47,255,.24);
}

.ball.extra{
  width:44px;
  height:44px;
  color:#ffe56b;
  border-color:rgba(240,192,64,.55);
  box-shadow:0 0 16px rgba(240,192,64,.22);
}

.extra-label{
  text-align:center;
  font-size:11px;
  color:rgba(246,240,255,.62);
  text-transform:uppercase;
  letter-spacing:1.4px;
  margin:7px 0 8px;
  font-weight:700;
}

.btn{
  width:100%;
  border:0;
  border-radius:14px;
  padding:13px;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  color:#fff;
  margin-top:9px;
  transition:.18s;
}

.btn:active{transform:scale(.98)}

.btn-main{
  background:linear-gradient(135deg,#003399,#0061ff);
  color:#fff2a8;
  box-shadow:0 0 24px rgba(0,97,255,.34);
}

.btn-main.loto{
  background:linear-gradient(135deg,#8a0000,#dd382f);
  box-shadow:0 0 24px rgba(221,56,47,.32);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
}

.btn-copy{background:rgba(255,255,255,.11)}

.btn-whatsapp{
  background:rgba(37,211,102,.20);
  border:1px solid rgba(37,211,102,.34);
}

.btn-insta{
  background:linear-gradient(135deg,rgba(255,0,128,.22),rgba(255,180,70,.16),rgba(123,47,255,.20));
  border:1px solid rgba(255,255,255,.12);
}

.btn-link{
  background:rgba(240,192,64,.12);
  border:1px solid rgba(240,192,64,.32);
  color:#fff2a8;
}

.status{
  display:none;
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  font-size:13px;
  line-height:1.4;
  background:rgba(31,209,139,.12);
  border:1px solid rgba(31,209,139,.28);
  color:#dbfff0;
}

.status.show{display:block}

.info-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-bottom:11px;
}

.info-tab{
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.045);
  color:rgba(246,240,255,.70);
  border-radius:12px;
  padding:9px 4px;
  font-size:11px;
  font-weight:800;
  cursor:pointer;
}

.info-tab.active{
  color:#fff2a8;
  border-color:rgba(240,192,64,.35);
  background:rgba(240,192,64,.11);
}

.panel{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:13px;
}

.label{
  font-size:13px;
  font-weight:800;
  color:var(--gold-soft);
  margin-bottom:8px;
}

.small{
  font-size:13px;
  line-height:1.45;
  color:var(--muted);
}

.stat-line{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-top:8px;
}

.chip{
  padding:7px 9px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  font-size:12px;
  font-weight:800;
}

.chip.hot{
  color:#fff2a8;
  border-color:rgba(240,192,64,.30);
}

.chip.cold{
  color:#bcd9ff;
  border-color:rgba(110,170,255,.30);
}

.gain-status{
  font-size:16px;
  font-weight:800;
  margin-bottom:7px;
}

.gain-status.ok{color:#8dffd2}
.gain-status.no{color:#ffd2da}

.history-item{
  padding:9px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:13px;
  color:var(--muted);
}

.history-item:last-child{border-bottom:0}

.footer{
  text-align:center;
  color:rgba(246,240,255,.40);
  font-size:11px;
  line-height:1.5;
  margin-top:14px;
}
</style>
</head>

<body>
<div class="stars" id="stars"></div>

<div class="container">

  <header class="header">
    <div class="logo">
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <defs>
          <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff2b0"/>
            <stop offset="45%" stop-color="#f0c040"/>
            <stop offset="100%" stop-color="#8d5d00"/>
          </linearGradient>
          <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#c599ff"/>
            <stop offset="100%" stop-color="#5520c6"/>
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="20" fill="url(#g1)"/>
        <circle cx="60" cy="60" r="34" fill="none" stroke="url(#g2)" stroke-width="6"/>
        <circle cx="60" cy="60" r="47" fill="none" stroke="url(#g1)" stroke-width="3"/>
        <path d="M60 22 L67 42 L88 42 L71 54 L78 76 L60 63 L42 76 L49 54 L32 42 L53 42 Z" fill="url(#g1)"/>
        <circle cx="22" cy="60" r="5" fill="url(#g1)"/>
        <circle cx="98" cy="60" r="5" fill="url(#g1)"/>
      </svg>
    </div>

    <h1>GALACTIC LOTTERY</h1>
    <div class="subtitle">
      Générateur aléatoire de grilles EuroMillions et Loto.<br>
      Sans garantie de gain.
    </div>
  </header>

  <div class="tabs">
    <button id="tabEuro" class="tab euro active" type="button">⭐ EuroMillions</button>
    <button id="tabLoto" class="tab loto" type="button">🎱 Loto</button>
  </div>

  <section class="card">
    <div class="card-title" id="gameTitle">✦ EuroMillions · Votre grille</div>
    <div class="next" id="nextDraw">Prochain tirage : calcul...</div>

    <div class="countdown-line">
      <div class="timebox"><strong id="cdDays">--</strong><span>jours</span></div>
      <div class="timebox"><strong id="cdHours">--</strong><span>heures</span></div>
      <div class="timebox"><strong id="cdMins">--</strong><span>min</span></div>
      <div class="timebox"><strong id="cdSecs">--</strong><span>sec</span></div>
    </div>

    <div class="balls-row" id="mainBalls"></div>
    <div class="extra-label" id="extraLabel">Étoiles</div>
    <div class="balls-row" id="extraBalls"></div>

    <button class="btn btn-main" id="generateBtn" type="button">🔮 Générer ma grille</button>

    <div class="row">
      <button class="btn btn-copy" id="copyBtn" type="button">📋 Copier</button>
      <button class="btn btn-whatsapp" id="whatsappBtn" type="button">🟢 WhatsApp</button>
    </div>

    <button class="btn btn-insta" id="shareBtn" type="button">📸 Instagram / autres apps</button>

    <div class="status" id="status"></div>
  </section>

  <section class="card">
    <div class="info-tabs">
      <button class="info-tab active" id="infoResult" type="button">Tirage</button>
      <button class="info-tab" id="infoGain" type="button">Gain</button>
      <button class="info-tab" id="infoStats" type="button">Stats</button>
      <button class="info-tab" id="infoHistory" type="button">Historique</button>
    </div>

    <div class="panel" id="infoPanel"></div>
  </section>

  <div class="footer">
    Données FDJ intégrées manuellement. Pour un montant exact, vérifie toujours les rapports officiels FDJ.
  </div>

</div>

<script>
(function(){
  var currentGame = "euro";
  var currentInfo = "result";
  var lastGrid = null;
  var history = loadHistory();

  var FDJ = {
    euro: {
      name: "EuroMillions",
      extraName: "Étoiles",
      resultDate: "Mardi 16 juin 2026",
      resultMain: [18,25,31,37,45],
      resultExtra: [4,9],
      resultNote: "My Million : CK 811 1065",
      hot: [
        {n:35,c:84},{n:42,c:82},{n:21,c:80},{n:29,c:78},{n:34,c:77}
      ],
      cold: [
        {n:22,c:44},{n:1,c:47},{n:43,c:53},{n:3,c:57},{n:31,c:57}
      ],
      statsNote: "Mise à jour FDJ : 16/06/26 · Depuis le 4 février 2020",
      statsUrl: "https://www.fdj.fr/jeux-de-tirage/euromillions-my-million/statistiques",
      resultsUrl: "https://www.fdj.fr/jeux-de-tirage/euromillions-my-million/resultats/mardi-16-juin-2026"
    },
    loto: {
      name: "Loto",
      extraName: "Numéro Chance",
      resultDate: "Mercredi 17 juin 2026",
      resultMain: [1,15,32,37,39],
      resultExtra: [1],
      resultNote: "Codes gagnants et Numéro7 disponibles sur FDJ",
      hot: [
        {n:30,c:128},{n:31,c:126},{n:24,c:121},{n:3,c:120},{n:28,c:119}
      ],
      cold: [
        {n:43,c:89},{n:1,c:92},{n:33,c:92},{n:14,c:94},{n:37,c:98}
      ],
      statsNote: "Mise à jour FDJ : 17/06/26 · Depuis le 14 juillet 2019",
      statsUrl: "https://www.fdj.fr/jeux-de-tirage/loto/statistiques",
      resultsUrl: "https://www.fdj.fr/jeux-de-tirage/loto/resultats/mercredi-17-juin-2026"
    }
  };

  function $(id){
    return document.getElementById(id);
  }

  function init(){
    createStars();
    bindButtons();
    resetBalls();
    renderInfo();
    renderHistory();
    updateNextDraw();
    setInterval(updateNextDraw, 1000);
  }

  function bindButtons(){
    $("tabEuro").addEventListener("click", function(){ switchGame("euro"); });
    $("tabLoto").addEventListener("click", function(){ switchGame("loto"); });

    $("generateBtn").addEventListener("click", generateGrid);
    $("copyBtn").addEventListener("click", copyGrid);
    $("whatsappBtn").addEventListener("click", shareWhatsApp);
    $("shareBtn").addEventListener("click", shareMobile);

    $("infoResult").addEventListener("click", function(){ switchInfo("result"); });
    $("infoGain").addEventListener("click", function(){ switchInfo("gain"); });
    $("infoStats").addEventListener("click", function(){ switchInfo("stats"); });
    $("infoHistory").addEventListener("click", function(){ switchInfo("history"); });
  }

  function createStars(){
    var stars = $("stars");
    stars.innerHTML = "";
    for(var i=0; i<95; i++){
      var s = document.createElement("div");
      s.className = "star";
      s.style.left = Math.random() * 100 + "%";
      s.style.top = Math.random() * 100 + "%";
      s.style.animationDelay = Math.random() * 4 + "s";
      stars.appendChild(s);
    }
  }

  function switchGame(game){
    currentGame = game;
    lastGrid = null;

    $("tabEuro").className = "tab euro" + (game === "euro" ? " active" : "");
    $("tabLoto").className = "tab loto" + (game === "loto" ? " active" : "");

    $("generateBtn").className = "btn btn-main" + (game === "loto" ? " loto" : "");
    $("gameTitle").textContent = game === "euro" ? "✦ EuroMillions · Votre grille" : "✦ Loto · Votre grille";
    $("extraLabel").textContent = game === "euro" ? "Étoiles" : "Numéro Chance";

    resetBalls();
    renderInfo();
    updateNextDraw();
    hideStatus();
  }

  function switchInfo(info){
    currentInfo = info;

    $("infoResult").className = "info-tab" + (info === "result" ? " active" : "");
    $("infoGain").className = "info-tab" + (info === "gain" ? " active" : "");
    $("infoStats").className = "info-tab" + (info === "stats" ? " active" : "");
    $("infoHistory").className = "info-tab" + (info === "history" ? " active" : "");

    renderInfo();
  }

  function resetBalls(){
    var main = $("mainBalls");
    var extra = $("extraBalls");
    main.innerHTML = "";
    extra.innerHTML = "";

    for(var i=0; i<5; i++){
      main.appendChild(makeBall("?"));
    }

    var count = currentGame === "euro" ? 2 : 1;
    for(var j=0; j<count; j++){
      extra.appendChild(makeBall("?", true));
    }
  }

  function makeBall(value, isExtra){
    var b = document.createElement("div");
    b.className = "ball" + (isExtra ? " extra" : "");
    b.textContent = value;
    return b;
  }

  function renderBalls(id, numbers, isExtra){
    var el = $(id);
    if(!el) return;
    el.innerHTML = "";
    for(var i=0; i<numbers.length; i++){
      el.appendChild(makeBall(numbers[i], isExtra));
    }
  }

  function randomPick(min,max,count){
    var arr = [];
    while(arr.length < count){
      var n = Math.floor(Math.random() * (max - min + 1)) + min;
      if(arr.indexOf(n) === -1){
        arr.push(n);
      }
    }
    arr.sort(function(a,b){ return a-b; });
    return arr;
  }

  function generateGrid(){
    var main = currentGame === "euro" ? randomPick(1,50,5) : randomPick(1,49,5);
    var extra = currentGame === "euro" ? randomPick(1,12,2) : randomPick(1,10,1);

    renderBalls("mainBalls", main, false);
    renderBalls("extraBalls", extra, true);

    lastGrid = {
      game: currentGame,
      main: main,
      extra: extra,
      date: new Date().toISOString()
    };

    history.unshift(lastGrid);
    history = history.slice(0,8);
    saveHistory();

    showStatus("Grille générée ✅");
    switchInfo("gain");
  }

  function countMatches(a,b){
    var total = 0;
    for(var i=0; i<a.length; i++){
      if(b.indexOf(a[i]) !== -1){
        total++;
      }
    }
    return total;
  }

  function getVerdict(game, main, extra){
    if(game === "euro"){
      var key = main + "+" + extra;
      var ranks = {
        "5+2":"Rang 1","5+1":"Rang 2","5+0":"Rang 3",
        "4+2":"Rang 4","4+1":"Rang 5","3+2":"Rang 6",
        "4+0":"Rang 7","2+2":"Rang 8","3+1":"Rang 9",
        "3+0":"Rang 10","1+2":"Rang 11","2+1":"Rang 12","2+0":"Rang 13"
      };
      return ranks[key] ? {win:true, rank:ranks[key]} : {win:false, rank:"Aucun"};
    }

    var keyLoto = main + "+" + extra;
    var ranksLoto = {
      "5+1":"Rang 1","5+0":"Rang 2","4+1":"Rang 3",
      "4+0":"Rang 4","3+1":"Rang 5","3+0":"Rang 6",
      "2+1":"Rang 7","2+0":"Rang 8","1+1":"Rang 9","0+1":"Rang 10"
    };
    return ranksLoto[keyLoto] ? {win:true, rank:ranksLoto[keyLoto]} : {win:false, rank:"Aucun"};
  }

  function renderInfo(){
    if(currentInfo === "result"){
      renderResultPanel();
    }else if(currentInfo === "gain"){
      renderGainPanel();
    }else if(currentInfo === "stats"){
      renderStatsPanel();
    }else{
      renderHistoryPanel();
    }
  }

  function renderResultPanel(){
    var d = FDJ[currentGame];
    $("infoPanel").innerHTML =
      '<div class="label">' + d.name + " · " + d.resultDate + '</div>' +
      '<div class="balls-row" id="officialMain"></div>' +
      '<div class="extra-label">' + d.extraName + '</div>' +
      '<div class="balls-row" id="officialExtra"></div>' +
      '<div class="small">' + d.resultNote + '</div>' +
      '<button class="btn btn-link" id="openResultsBtn" type="button">Voir les résultats FDJ</button>';

    renderBalls("officialMain", d.resultMain, false);
    renderBalls("officialExtra", d.resultExtra, true);

    $("openResultsBtn").addEventListener("click", function(){
      window.open(d.resultsUrl, "_blank");
    });
  }

  function renderGainPanel(){
    var d = FDJ[currentGame];

    if(!lastGrid){
      $("infoPanel").innerHTML =
        '<div class="gain-status no">Aucune grille vérifiée</div>' +
        '<div class="small">Génère une grille pour comparer avec le dernier tirage officiel affiché.</div>' +
        '<button class="btn btn-link" id="openGainBtn" type="button">Vérifier sur FDJ</button>';

      $("openGainBtn").addEventListener("click", function(){
        window.open(d.resultsUrl, "_blank");
      });
      return;
    }

    var mainMatches = countMatches(lastGrid.main, d.resultMain);
    var extraMatches = countMatches(lastGrid.extra, d.resultExtra);
    var verdict = getVerdict(currentGame, mainMatches, extraMatches);

    var statusClass = verdict.win ? "ok" : "no";
    var statusText = verdict.win ? "✅ Gagnant" : "❌ Non gagnant";

    $("infoPanel").innerHTML =
      '<div class="gain-status ' + statusClass + '">' + statusText + '</div>' +
      '<div class="small">' +
        'Ta grille : <strong>' + lastGrid.main.join(" - ") + '</strong> | <strong>' + lastGrid.extra.join(" - ") + '</strong><br>' +
        'Correspondances : <strong>' + mainMatches + ' numéro(s)</strong> + <strong>' + extraMatches + " " + d.extraName.toLowerCase() + '</strong><br>' +
        'Rang estimé : <strong>' + verdict.rank + '</strong><br>' +
        'Montant exact : à vérifier sur les rapports FDJ.' +
      '</div>' +
