<script>
var appStarted = false;
var game = "euro";
var lastGrid = null;
var historyKey = "galactic_history_v9";
var historyList = [];

try {
  historyList = JSON.parse(localStorage.getItem(historyKey) || "[]");
} catch(e) {
  historyList = [];
}

var FDJ = {
  euro: {
    name: "EuroMillions",
    extra: "Étoiles",
    date: "Mardi 16 juin 2026",
    main: [18,25,31,37,45],
    ex: [4,9],
    note: "My Million : CK 811 1065",
    hot: [[35,84],[42,82],[21,80]],
    cold: [[22,44],[1,47],[43,53]],
    stat: "Palmarès officiel FDJ à vérifier sur la page statistiques.",
    statsUrl: "https://www.fdj.fr/jeux-de-tirage/euromillions-my-million/statistiques",
    resUrl: "https://www.fdj.fr/jeux-de-tirage/euromillions-my-million/resultats/mardi-16-juin-2026"
  },
  loto: {
    name: "Loto",
    extra: "Numéro Chance",
    date: "Mercredi 17 juin 2026",
    main: [1,15,32,37,39],
    ex: [1],
    note: "Codes Loto et Numéro7 disponibles sur FDJ.",
    hot: [[30,128],[31,126],[24,121]],
    cold: [[43,89],[1,92],[33,92]],
    stat: "Palmarès officiel FDJ à vérifier sur la page statistiques.",
    statsUrl: "https://www.fdj.fr/jeux-de-tirage/loto/statistiques",
    resUrl: "https://www.fdj.fr/jeux-de-tirage/loto/resultats/mercredi-17-juin-2026"
  }
};

function getEl(id) {
  return document.getElementById(id);
}

function safeText(id, text) {
  var element = getEl(id);
  if (element) element.textContent = text;
}

function startApp() {
  if (appStarted) return;
  appStarted = true;

  createStars();
  bindButtons();
  renderOfficial();
  renderHistory();
  generateStarterGrid();
  updateTimer();
  setInterval(updateTimer, 1000);
}

function bindButtons() {
  if (getEl("tabEuro")) getEl("tabEuro").onclick = function(){ switchGame("euro"); };
  if (getEl("tabLoto")) getEl("tabLoto").onclick = function(){ switchGame("loto"); };

  if (getEl("generateBtn")) getEl("generateBtn").onclick = generateGrid;
  if (getEl("generate")) getEl("generate").onclick = generateGrid;

  if (getEl("copy")) getEl("copy").onclick = copyGrid;
  if (getEl("wa")) getEl("wa").onclick = shareWhatsApp;
  if (getEl("insta")) getEl("insta").onclick = shareInstagram;
  if (getEl("threads")) getEl("threads").onclick = shareThreads;

  if (getEl("openResults")) getEl("openResults").onclick = openResults;
  if (getEl("openStats")) getEl("openStats").onclick = openStats;
  if (getEl("clear")) getEl("clear").onclick = clearHistory;

  var infoTabs = document.getElementsByClassName("infoTab");
  for (var i = 0; i < infoTabs.length; i++) {
    infoTabs[i].onclick = function() {
      var target = this.getAttribute("data-panel");
      if (!target) {
        if (this.id === "tabInfoTirage") target = "tirage";
        if (this.id === "tabInfoGain") target = "gain";
        if (this.id === "tabInfoStats") target = "stats";
        if (this.id === "tabInfoHistorique") target = "historique";
      }
      switchPanel(target);
    };
  }
}

function createStars() {
  var box = getEl("stars");
  if (!box) return;

  box.innerHTML = "";

  for (var i = 0; i < 100; i++) {
    var star = document.createElement("i");
    star.className = "star";
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    star.style.animationDelay = Math.random() * 4 + "s";
    box.appendChild(star);
  }
}

function renderBalls(id, arr, extra) {
  var box = getEl(id);
  if (!box) return;

  box.innerHTML = "";

  for (var i = 0; i < arr.length; i++) {
    var ball = document.createElement("div");
    ball.className = "ball" + (extra ? " extra" : "");
    ball.textContent = arr[i];
    box.appendChild(ball);
  }
}

function pickNumbers(min, max, count) {
  var arr = [];

  while (arr.length < count) {
    var n = Math.floor(Math.random() * (max - min + 1)) + min;
    if (arr.indexOf(n) === -1) arr.push(n);
  }

  return arr.sort(function(a,b){ return a-b; });
}

function renderOfficial() {
  var f = FDJ[game];

  safeText("resultDate", f.name + " · " + f.date);
  safeText("resExtraLabel", f.extra);
  safeText("resultNote", f.note);
  safeText("statNote", f.stat);

  renderBalls("resMain", f.main, false);
  renderBalls("resExtra", f.ex, true);

  var hot = getEl("hot");
  if (hot) {
    hot.innerHTML = "";
    for (var i = 0; i < f.hot.length; i++) {
      hot.innerHTML += '<span class="chip hot">' + f.hot[i][0] + ' · ' + f.hot[i][1] + '</span>';
    }
  }

  var cold = getEl("cold");
  if (cold) {
    cold.innerHTML = "";
    for (var j = 0; j < f.cold.length; j++) {
      cold.innerHTML += '<span class="chip cold">' + f.cold[j][0] + ' · ' + f.cold[j][1] + '</span>';
    }
  }
}

function generateStarterGrid() {
  var main = game === "euro" ? pickNumbers(1,50,5) : pickNumbers(1,49,5);
  var ex = game === "euro" ? pickNumbers(1,12,2) : pickNumbers(1,10,1);

  displayGrid(main, ex);
}

function generateGrid() {
  var main = game === "euro" ? pickNumbers(1,50,5) : pickNumbers(1,49,5);
  var ex = game === "euro" ? pickNumbers(1,12,2) : pickNumbers(1,10,1);

  displayGrid(main, ex);

  historyList.unshift(lastGrid);
  historyList = historyList.slice(0,8);
  localStorage.setItem(historyKey, JSON.stringify(historyList));

  renderHistory();
  showMessage("Nouvelle grille générée ✅");
}

function displayGrid(main, ex) {
  renderBalls("mainBalls", main, false);
  renderBalls("extraBalls", ex, true);

  lastGrid = {
    game: game,
    main: main,
    ex: ex,
    date: new Date().toISOString()
  };

  evaluateGain();
}

function countMatches(a,b) {
  var count = 0;

  for (var i = 0; i < a.length; i++) {
    if (b.indexOf(a[i]) > -1) count++;
  }

  return count;
}

function getRank(g,m,e) {
  if (g === "euro") {
    var euroRanks = {
      "5+2":"Rang 1",
      "5+1":"Rang 2",
      "5+0":"Rang 3",
      "4+2":"Rang 4",
      "4+1":"Rang 5",
      "3+2":"Rang 6",
      "4+0":"Rang 7",
      "2+2":"Rang 8",
      "3+1":"Rang 9",
      "3+0":"Rang 10",
      "1+2":"Rang 11",
      "2+1":"Rang 12",
      "2+0":"Rang 13"
    };

    return euroRanks[m + "+" + e] || "Aucun";
  }

  var lotoRanks = {
    "5+1":"Rang 1",
    "5+0":"Rang 2",
    "4+1":"Rang 3",
    "4+0":"Rang 4",
    "3+1":"Rang 5",
    "3+0":"Rang 6",
    "2+1":"Rang 7",
    "2+0":"Rang 8",
    "1+1":"Rang 9",
    "0+1":"Rang 10"
  };

  return lotoRanks[m + "+" + e] || "Aucun";
}

function evaluateGain() {
  if (!lastGrid) {
    safeText("gainStatus", "Aucune grille");
    safeText("gainText", "Génère une grille pour comparer avec le dernier tirage affiché.");
    return;
  }

  var f = FDJ[game];
  var m = countMatches(lastGrid.main, f.main);
  var e = countMatches(lastGrid.ex, f.ex);
  var rank = getRank(game, m, e);

  var status = getEl("gainStatus");
  var text = getEl("gainText");

  if (status) {
    status.textContent = rank === "Aucun" ? "❌ Non gagnant" : "✅ Gagnant";
    status.className = "label " + (rank === "Aucun" ? "gainNo" : "gainOk");
  }

  if (text) {
    text.innerHTML =
      m + " numéro(s) + " + e + " " + f.extra.toLowerCase() +
      "<br>Rang estimé : <b>" + rank + "</b>" +
      "<br>Montant exact à vérifier sur FDJ.";
  }
}

function makeShareText() {
  if (!lastGrid) return "";

  var f = FDJ[lastGrid.game];

  return "Ma grille Galactic Lottery\n" +
    f.name + "\n" +
    "Numéros : " + lastGrid.main.join(" - ") + "\n" +
    f.extra + " : " + lastGrid.ex.join(" - ") + "\n" +
    window.location.href;
}

function copyGrid() {
  var text = makeShareText();

  if (!text) {
    showMessage("Aucune grille disponible.");
    return;
  }

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function(){
      showMessage("Grille copiée ✅");
    }).catch(function(){
      copyFallback(text);
    });
  } else {
    copyFallback(text);
  }
}

function copyFallback(text) {
  var area = document.createElement("textarea");
  area.value = text;
  document.body.appendChild(area);
  area.select();
  document.execCommand("copy");
  area.remove();
  showMessage("Grille copiée ✅");
}

function shareWhatsApp() {
  var text = makeShareText();

  if (!text) {
    showMessage("Aucune grille disponible.");
    return;
  }

  window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank");
}

function shareInstagram() {
  var text = makeShareText();

  if (!text) {
    showMessage("Aucune grille disponible.");
    return;
  }

  if (navigator.share) {
    navigator.share({
      title: "Galactic Lottery",
      text: text,
      url: window.location.href
    }).catch(function(){
      copyFallback(text);
    });
  } else {
    copyFallback(text);
    showMessage("Texte copié ✅ Ouvre Instagram et colle ta grille.");
  }
}

function shareThreads() {
  var text = makeShareText();

  if (!text) {
    showMessage("Aucune grille disponible.");
    return;
  }

  window.open("https://www.threads.net/intent/post?text=" + encodeURIComponent(text), "_blank");
}

function showMessage(text) {
  var box = getEl("status");
  if (!box) return;

  box.textContent = text;
  box.className = "status show";

  setTimeout(function(){
    box.className = "status";
  },3500);
}

function getNextDraw() {
  var now = new Date();
  var days = game === "euro" ? [2,5] : [1,3,6];
  var hour = game === "euro" ? 21 : 20;
  var minute = game === "euro" ? 5 : 20;

  for (var i = 0; i < 8; i++) {
    var d = new Date(now);
    d.setDate(now.getDate() + i);
    d.setHours(hour, minute, 0, 0);

    if (days.indexOf(d.getDay()) > -1 && d > now) {
      return d;
    }
  }

  return now;
}

function updateTimer() {
  var d0 = getNextDraw();
  var diff = Math.max(0, d0 - new Date());

  var da = Math.floor(diff / 86400000);
  var ho = Math.floor((diff % 86400000) / 3600000);
  var mi = Math.floor((diff % 3600000) / 60000);
  var se = Math.floor((diff % 60000) / 1000);

  safeText("d", ("0" + da).slice(-2));
  safeText("h", ("0" + ho).slice(-2));
  safeText("m", ("0" + mi).slice(-2));
  safeText("s", ("0" + se).slice(-2));

  safeText(
    "nextDraw",
    "Prochain tirage : " +
    d0.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"}) +
    " vers " +
    d0.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})
  );
}

function switchGame(g) {
  game = g;

  if (getEl("tabEuro")) getEl("tabEuro").className = "tab euro" + (g === "euro" ? " on" : "");
  if (getEl("tabLoto")) getEl("tabLoto").className = "tab loto" + (g === "loto" ? " on" : "");

  if (getEl("generateBtn")) getEl("generateBtn").className = "btn mainBtn" + (g === "loto" ? " loto" : "");
  if (getEl("generate")) getEl("generate").className = "btn mainBtn" + (g === "loto" ? " loto" : "");

  safeText("gameTitle", g === "euro" ? "✦ EuroMillions · Votre grille" : "✦ Loto · Votre grille");
  safeText("extraLabel", g === "euro" ? "Étoiles" : "Numéro Chance");

  renderOfficial();
  generateStarterGrid();
  updateTimer();
}

function switchPanel(panelId) {
  var allTabs = document.getElementsByClassName("infoTab");
  var panels = document.getElementsByClassName("panel");

  for (var i = 0; i < allTabs.length; i++) {
    allTabs[i].className = "infoTab";
  }

  for (var j = 0; j < panels.length; j++) {
    panels[j].className = "panel";
  }

  if (panelId === "tirage" && getEl("tabInfoTirage")) getEl("tabInfoTirage").className = "infoTab active";
  if (panelId === "gain" && getEl("tabInfoGain")) getEl("tabInfoGain").className = "infoTab active";
  if (panelId === "stats" && getEl("tabInfoStats")) getEl("tabInfoStats").className = "infoTab active";
  if (panelId === "historique" && getEl("tabInfoHistorique")) getEl("tabInfoHistorique").className = "infoTab active";

  if (getEl(panelId)) getEl(panelId).className = "panel active";
}

function openResults() {
  window.open(FDJ[game].resUrl, "_blank");
}

function openStats() {
  window.open(FDJ[game].statsUrl, "_blank");
}

function renderHistory() {
  var box = getEl("history");
  if (!box) return;

  if (historyList.length === 0) {
    box.textContent = "Aucune grille encore...";
    return;
  }

  var html = "";

  for (var i = 0; i < historyList.length; i++) {
    var item = historyList[i];

    html += '<div class="hist">' +
      (item.game === "euro" ? "⭐ EuroMillions" : "🎱 Loto") +
      " : " + item.main.join(" - ") + " | " + item.ex.join(" - ") +
      "</div>";
  }

  box.innerHTML = html;
}

function clearHistory() {
  historyList = [];
  localStorage.setItem(historyKey, JSON.stringify(historyList));
  renderHistory();
  showMessage("Historique effacé ✅");
}

document.addEventListener("DOMContentLoaded", startApp);
window.addEventListener("load", startApp);
              </script>
</body>
</html>
